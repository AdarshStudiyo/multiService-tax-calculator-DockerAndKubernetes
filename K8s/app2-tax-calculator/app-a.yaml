apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a-tax-calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-a-tax-calculator
  template:
    metadata:
      labels:
        app: app-a-tax-calculator
    spec:
      containers:
        - name: app-a-tax-calculator
          image: adarshhhh21/service-a:latest
          env:
            - name: TAX_SERVICE_URL
              value: http://service-b:4000
            - name: FRONTEND_URL
              value: http://localhost:5173
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: app-a-tax-calculator
spec:
  selector:
    app: app-a-tax-calculator
  type: NodePort
  ports:
    - port: 8081
      targetPort: 3000
      nodePort: 32400

    