apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b-tax-calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-b-tax-calculator
  template:
    metadata:
      labels:
        app: app-b-tax-calculator
    spec:
      containers:
        - name: app-b-tax-calculator
          image: adarshhhh21/service-b:latest
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: app-b-tax-calculator
spec:
  selector:
    app: app-b-tax-calculator
  type: NodePort
  ports:
    - port: 8080
      targetPort: 4000
      nodePort: 32450

  